<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Battlship</title><script defer="defer" src="main.bundle.js"></script></head><body><header><h1>Battleship</h1></header><section id="homeScreen"><button type="button" id="computerGame" class="homeScreenBtn" data-action="computer">Play vs Computer</button> <button type="button" id="humanGame" class="homeScreenBtn" data-action="human">Play vs Player</button></section><main id="gameScreen" class="hidden"><section id="placementControls" class="placement-controls"><h2 id="placementTitle">Player 1: Place your fleet</h2><div class="placement-actions"><div id="shipOptions" class="ship-options"></div><button type="button" id="rotateShipBtn" class="rotate-ship-btn">Orientation: Horizontal</button></div><p id="placementStatus" class="placement-status"></p></section><div id="player1"><h3>Player 1</h3><div id="player1-grid" class="game-board" data-player="player1"></div></div><div id="player2"><h3>Player 2</h3><div id="player2-grid" class="game-board" data-player="player2"></div></div></main><section id="hiddenScreen" class="hidden"><h2>Pass to the next player then press the button</h2><button type="button" id="passPlayer" class="passBtn">I'm Ready</button></section><section id="winnerScreen" class="hidden"><h1><span id="winnerName"></span> has won the game!</h1><button type="button" id="restartGameBtn" class="restartBtn">Play Again</button></section><footer><p>Built by <a href="https://github.com/Ali7488">Mohannad Ali</a></p></footer></body></html>
